services:
  backend:
    build: ./backend
    ports:
      - "8189:8189"
    volumes:
      - ./accounts.json:/app/accounts.json:ro
    environment:
      - CONFIG_PATH=/app/accounts.json
      - BACKEND_PORT=8189
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8188:80"
    depends_on:
      - backend
    restart: unless-stopped
